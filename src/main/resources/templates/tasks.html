<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: white;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #495057;
            margin-bottom: 10px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background-color: #495057;
            border-left: 4px solid #0d6efd;
        }
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .logout-container {
            margin-top: auto;
            border-top: 1px solid #495057;
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="container-fluid">
        <h2 class="mb-4">Tasks Management</h2>

        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#taskModal" id="addTaskBtn">Add New Task</button>

        <table class="table table-striped table-hover shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Lead ID</th>
                    <th>Deal ID</th>
                    <th>Assigned To</th>
                    <th>Status</th>
                    <th>Due Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tasksTableBody">
                <!-- Tasks will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Task Modal -->
<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="taskModalTitle">Add/Edit Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="mb-3">
                        <label>Title</label>
                        <input type="text" class="form-control" id="taskTitle" required>
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <textarea class="form-control" id="taskDesc"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Lead ID</label>
                        <input type="number" class="form-control" id="taskLeadId">
                    </div>
                    <div class="mb-3">
                        <label>Deal ID</label>
                        <input type="number" class="form-control" id="taskDealId">
                    </div>
                    <div class="mb-3">
                        <label for="taskAssignedTo" class="form-label">Assigned To</label>
                        <select class="form-select" id="taskAssignedTo">
                            <option value="">-- Unassigned --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Status</label>
                        <select class="form-select" id="taskStatus">
                            <option value="PENDING">PENDING</option>
                            <option value="IN_PROGRESS">IN PROGRESS</option>
                            <option value="COMPLETED">COMPLETED</option>
                        </select>
                    </div>
                     <div class="mb-3">
                        <label>Due Date</label>
                        <input type="datetime-local" class="form-control" id="taskDueDate">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    const taskModal = new bootstrap.Modal(document.getElementById('taskModal'));

    // Dynamically load sidebar
    fetch('/dashboard')
        .then(response => response.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const sidebar = doc.querySelector('.sidebar');
            if(sidebar) {
                const currentLink = sidebar.querySelector('a[href="/tasks"]');
                if(currentLink) currentLink.classList.add('active');

                const dashboardLink = sidebar.querySelector('a[href="/dashboard"]');
                if(dashboardLink) dashboardLink.classList.remove('active');

                document.getElementById('sidebar-container').replaceWith(sidebar);

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                });
            }
        });

    async function loadUsersForDropdown() {
        const response = await fetch('/api/users/list', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const users = await response.json();
            const select = document.getElementById('taskAssignedTo');
            users.forEach(user => {
                select.innerHTML += `<option value="${user.id}">${user.name} (${user.email})</option>`;
            });
        }
    }

    async function loadTasks() {
        const response = await fetch('/api/tasks', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const tasks = await response.json();
            const tbody = document.getElementById('tasksTableBody');
            tbody.innerHTML = '';
            tasks.forEach(task => {
                const leadId = task.lead ? task.lead.id : '';
                const dealId = task.deal ? task.deal.id : '';
                const assignedTo = task.assignedTo ? `${task.assignedTo.name}` : 'Unassigned';

                tbody.innerHTML += `
                    <tr>
                        <td>${task.id}</td>
                        <td>${task.title}</td>
                        <td>${task.description || ''}</td>
                        <td>${leadId}</td>
                        <td>${dealId}</td>
                        <td>${assignedTo}</td>
                        <td><span class="badge bg-${getStatusColor(task.status)}">${task.status || 'PENDING'}</span></td>
                        <td>${task.dueDate ? new Date(task.dueDate).toLocaleString() : ''}</td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick='editTask(${JSON.stringify(task).replace(/'/g, "\\'")})'>Edit</button>
                            <button class="btn btn-sm btn-danger" onclick='deleteTask(${task.id})'>Delete</button>
                        </td>
                    </tr>
                `;
            });
        }
    }

    function getStatusColor(status) {
        switch(status) {
            case 'PENDING': return 'warning';
            case 'IN_PROGRESS': return 'primary';
            case 'COMPLETED': return 'success';
            default: return 'secondary';
        }
    }

    document.getElementById('addTaskBtn').addEventListener('click', () => {
        document.getElementById('taskForm').reset();
        document.getElementById('taskId').value = '';
        document.getElementById('taskModalTitle').innerText = 'Add New Task';
    });

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('taskId').value;
        const task = {
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDesc').value,
            status: document.getElementById('taskStatus').value,
            dueDate: document.getElementById('taskDueDate').value || null
        };

        const leadId = document.getElementById('taskLeadId').value;
        if(leadId) task.lead = { id: parseInt(leadId) };

        const dealId = document.getElementById('taskDealId').value;
        if(dealId) task.deal = { id: parseInt(dealId) };

        const assignedToId = document.getElementById('taskAssignedTo').value;
        if(assignedToId) task.assignedTo = { id: parseInt(assignedToId) };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/tasks/${id}` : '/api/tasks';

        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(task)
        });

        if (response.ok) {
            taskModal.hide();
            loadTasks();
        } else {
            const errorText = await response.text();
            console.error('Save failed:', errorText);
            alert('Failed to save task. ' + errorText);
        }
    });

    window.editTask = function(task) {
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDesc').value = task.description || '';
        document.getElementById('taskLeadId').value = task.lead ? task.lead.id : '';
        document.getElementById('taskDealId').value = task.deal ? task.deal.id : '';
        document.getElementById('taskAssignedTo').value = task.assignedTo ? task.assignedTo.id : '';
        document.getElementById('taskStatus').value = task.status || 'PENDING';
        document.getElementById('taskDueDate').value = task.dueDate ? task.dueDate.substring(0, 16) : '';

        document.getElementById('taskModalTitle').innerText = 'Edit Task';
        taskModal.show();
    };

    window.deleteTask = async function(id) {
        if (confirm('Are you sure you want to delete this task?')) {
            const response = await fetch(`/api/tasks/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                loadTasks();
            } else {
                alert('Failed to delete task');
            }
        }
    };

    loadUsersForDropdown();
    loadTasks();
});
</script>
</body>
</html>
