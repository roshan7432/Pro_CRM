<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Leads</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: white;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #495057;
            margin-bottom: 10px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background-color: #495057;
            border-left: 4px solid #0d6efd;
        }
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .logout-container {
            margin-top: auto;
            border-top: 1px solid #495057;
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="container-fluid">
        <h2 class="mb-4">Leads Management</h2>

        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#leadModal" id="addLeadBtn">Add New Lead</button>

        <table class="table table-striped table-hover shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Company</th>
                    <th>Assigned To</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="leadsTableBody">
                <!-- Leads will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Lead Modal -->
<div class="modal fade" id="leadModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="leadModalTitle">Add/Edit Lead</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="leadForm">
                    <input type="hidden" id="leadId">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" id="leadName" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" id="leadEmail" required>
                    </div>
                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text" class="form-control" id="leadPhone" required>
                    </div>
                    <div class="mb-3">
                        <label>Company</label>
                        <input type="text" class="form-control" id="leadCompany">
                    </div>
                    <div class="mb-3">
                        <label for="leadAssignedTo" class="form-label">Assigned To</label>
                        <select class="form-select" id="leadAssignedTo">
                            <option value="">-- Unassigned --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Status</label>
                        <select class="form-select" id="leadStatus">
                            <option value="NEW">NEW</option>
                            <option value="CONTACTED">CONTACTED</option>
                            <option value="QUALIFIED">QUALIFIED</option>
                            <option value="PROPOSAL_SENT">PROPOSAL_SENT</option>
                            <option value="WON">WON</option>
                            <option value="LOST">LOST</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    const leadModal = new bootstrap.Modal(document.getElementById('leadModal'));

    // Dynamically load sidebar
    fetch('/dashboard')
        .then(response => response.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const sidebar = doc.querySelector('.sidebar');
            if(sidebar) {
                // Make the current page's link active
                const currentLink = sidebar.querySelector('a[href="/leads"]');
                if(currentLink) currentLink.classList.add('active');

                const dashboardLink = sidebar.querySelector('a[href="/dashboard"]');
                if(dashboardLink) dashboardLink.classList.remove('active');

                document.getElementById('sidebar-container').replaceWith(sidebar);

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                });
            }
        });

    async function loadUsersForDropdown() {
        const response = await fetch('/api/users/list', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const users = await response.json();
            const select = document.getElementById('leadAssignedTo');
            users.forEach(user => {
                select.innerHTML += `<option value="${user.id}">${user.name} (${user.email})</option>`;
            });
        }
    }

    async function loadLeads() {
        const response = await fetch('/api/leads', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const leads = await response.json();
            const tbody = document.getElementById('leadsTableBody');
            tbody.innerHTML = '';
            leads.forEach(lead => {
                const assignedTo = lead.assignedTo ? `${lead.assignedTo.name}` : 'Unassigned';
                tbody.innerHTML += `
                    <tr>
                        <td>${lead.id}</td>
                        <td>${lead.name}</td>
                        <td>${lead.email}</td>
                        <td>${lead.phone}</td>
                        <td>${lead.company || ''}</td>
                        <td>${assignedTo}</td>
                        <td><span class="badge bg-${getStatusColor(lead.status)}">${lead.status || 'NEW'}</span></td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick='editLead(${JSON.stringify(lead).replace(/'/g, "\\'")})'>Edit</button>
                            <button class="btn btn-sm btn-danger" onclick='deleteLead(${lead.id})'>Delete</button>
                        </td>
                    </tr>
                `;
            });
        } else {
             console.error("Failed to load leads, status:", response.status);
             const text = await response.text();
             console.error("Response:", text);
        }
    }

    function getStatusColor(status) {
        switch(status) {
            case 'NEW': return 'primary';
            case 'CONTACTED': return 'warning';
            case 'WON': return 'success';
            case 'LOST': return 'danger';
            default: return 'secondary';
        }
    }

    document.getElementById('addLeadBtn').addEventListener('click', () => {
        document.getElementById('leadForm').reset();
        document.getElementById('leadId').value = '';
        document.getElementById('leadModalTitle').innerText = 'Add New Lead';
    });

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('leadId').value;
        const lead = {
            name: document.getElementById('leadName').value,
            email: document.getElementById('leadEmail').value,
            phone: document.getElementById('leadPhone').value,
            company: document.getElementById('leadCompany').value,
            status: document.getElementById('leadStatus').value
        };

        const assignedToId = document.getElementById('leadAssignedTo').value;
        if(assignedToId) {
            lead.assignedTo = { id: parseInt(assignedToId) };
        }

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/leads/${id}` : '/api/leads';

        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(lead)
        });

        if (response.ok) {
            leadModal.hide();
            loadLeads();
        } else {
            const errorText = await response.text();
            console.error('Save failed:', errorText);
            alert('Failed to save lead. ' + errorText);
        }
    });

    window.editLead = function(lead) {
        document.getElementById('leadId').value = lead.id;
        document.getElementById('leadName').value = lead.name;
        document.getElementById('leadEmail').value = lead.email;
        document.getElementById('leadPhone').value = lead.phone;
        document.getElementById('leadCompany').value = lead.company || '';
        document.getElementById('leadAssignedTo').value = lead.assignedTo ? lead.assignedTo.id : '';
        document.getElementById('leadStatus').value = lead.status || 'NEW';
        document.getElementById('leadModalTitle').innerText = 'Edit Lead';
        leadModal.show();
    };

    window.deleteLead = async function(id) {
        if (confirm('Are you sure you want to delete this lead?')) {
            const response = await fetch(`/api/leads/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                loadLeads();
            } else {
                alert('Failed to delete lead');
            }
        }
    };

    loadUsersForDropdown();
    loadLeads();
});
</script>

</body>
</html>
