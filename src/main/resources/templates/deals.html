<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Deals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .sidebar {
            width: 250px;
            background-color: #343a40;
            color: white;
            flex-shrink: 0;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #495057;
            margin-bottom: 10px;
        }
        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background-color: #495057;
            border-left: 4px solid #0d6efd;
        }
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .logout-container {
            margin-top: auto;
            border-top: 1px solid #495057;
        }
    </style>
</head>
<body>

<div id="sidebar-container"></div>

<div class="main-content">
    <div class="container-fluid">
        <h2 class="mb-4">Deals Management</h2>

        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#dealModal" id="addDealBtn">Add New Deal</button>

        <table class="table table-striped table-hover shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Stage</th>
                    <th>Lead ID</th>
                    <th>Assigned To</th>
                    <th>Close Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="dealsTableBody">
                <!-- Deals will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Deal Modal -->
<div class="modal fade" id="dealModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="dealModalTitle">Add/Edit Deal</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="dealForm">
                    <input type="hidden" id="dealId">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" class="form-control" id="dealName" required>
                    </div>
                    <div class="mb-3">
                        <label>Amount</label>
                        <input type="number" step="0.01" class="form-control" id="dealAmount" required>
                    </div>
                     <div class="mb-3">
                        <label>Lead ID</label>
                        <input type="number" class="form-control" id="dealLeadId">
                    </div>
                     <div class="mb-3">
                        <label for="dealAssignedTo" class="form-label">Assigned To</label>
                        <select class="form-select" id="dealAssignedTo">
                            <option value="">-- Unassigned --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Stage</label>
                        <select class="form-select" id="dealStage">
                            <option value="INITIATED">INITIATED</option>
                            <option value="QUALIFIED">QUALIFIED</option>
                            <option value="PRESENTATION">PRESENTATION</option>
                            <option value="NEGOTIATION">NEGOTIATION</option>
                            <option value="WON">WON</option>
                            <option value="LOST">LOST</option>
                        </select>
                    </div>
                     <div class="mb-3">
                        <label>Expected Close Date</label>
                        <input type="datetime-local" class="form-control" id="dealDate">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login';
        return;
    }

    const dealModal = new bootstrap.Modal(document.getElementById('dealModal'));

    // Dynamically load sidebar
    fetch('/dashboard')
        .then(response => response.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const sidebar = doc.querySelector('.sidebar');
            if(sidebar) {
                const currentLink = sidebar.querySelector('a[href="/deals"]');
                if(currentLink) currentLink.classList.add('active');

                const dashboardLink = sidebar.querySelector('a[href="/dashboard"]');
                if(dashboardLink) dashboardLink.classList.remove('active');

                document.getElementById('sidebar-container').replaceWith(sidebar);

                document.getElementById('logoutBtn').addEventListener('click', () => {
                    localStorage.removeItem('token');
                    window.location.href = '/login';
                });
            }
        });

    async function loadUsersForDropdown() {
        const response = await fetch('/api/users/list', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const users = await response.json();
            const select = document.getElementById('dealAssignedTo');
            users.forEach(user => {
                select.innerHTML += `<option value="${user.id}">${user.name} (${user.email})</option>`;
            });
        }
    }

    async function loadDeals() {
        const response = await fetch('/api/deals', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
            const deals = await response.json();
            const tbody = document.getElementById('dealsTableBody');
            tbody.innerHTML = '';
            deals.forEach(deal => {
                 const leadId = deal.lead ? deal.lead.id : '';
                 const assignedTo = deal.assignedTo ? `${deal.assignedTo.name}` : 'Unassigned';
                tbody.innerHTML += `
                    <tr>
                        <td>${deal.id}</td>
                        <td>${deal.name}</td>
                        <td>$${deal.amount}</td>
                        <td><span class="badge bg-${getStageColor(deal.stage)}">${deal.stage || 'INITIATED'}</span></td>
                        <td>${leadId}</td>
                        <td>${assignedTo}</td>
                        <td>${deal.expectedCloseDate ? new Date(deal.expectedCloseDate).toLocaleString() : ''}</td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick='editDeal(${JSON.stringify(deal).replace(/'/g, "\\'")})'>Edit</button>
                            <button class="btn btn-sm btn-danger" onclick='deleteDeal(${deal.id})'>Delete</button>
                        </td>
                    </tr>
                `;
            });
        }
    }

    function getStageColor(stage) {
        switch(stage) {
            case 'INITIATED': return 'secondary';
            case 'WON': return 'success';
            case 'LOST': return 'danger';
            default: return 'primary';
        }
    }

    document.getElementById('addDealBtn').addEventListener('click', () => {
        document.getElementById('dealForm').reset();
        document.getElementById('dealId').value = '';
        document.getElementById('dealModalTitle').innerText = 'Add New Deal';
    });

    document.getElementById('dealForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('dealId').value;
        const deal = {
            name: document.getElementById('dealName').value,
            amount: parseFloat(document.getElementById('dealAmount').value),
            stage: document.getElementById('dealStage').value,
            expectedCloseDate: document.getElementById('dealDate').value || null
        };

        const leadId = document.getElementById('dealLeadId').value;
        if(leadId) deal.lead = { id: parseInt(leadId) };

        const assignedToId = document.getElementById('dealAssignedTo').value;
        if(assignedToId) deal.assignedTo = { id: parseInt(assignedToId) };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/deals/${id}` : '/api/deals';

        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(deal)
        });

        if (response.ok) {
            dealModal.hide();
            loadDeals();
        } else {
            const errorText = await response.text();
            console.error('Save failed:', errorText);
            alert('Failed to save deal. ' + errorText);
        }
    });

    window.editDeal = function(deal) {
        document.getElementById('dealId').value = deal.id;
        document.getElementById('dealName').value = deal.name;
        document.getElementById('dealAmount').value = deal.amount;
        document.getElementById('dealStage').value = deal.stage || 'INITIATED';
        document.getElementById('dealDate').value = deal.expectedCloseDate ? deal.expectedCloseDate.substring(0, 16) : '';
        document.getElementById('dealLeadId').value = deal.lead ? deal.lead.id : '';
        document.getElementById('dealAssignedTo').value = deal.assignedTo ? deal.assignedTo.id : '';

        document.getElementById('dealModalTitle').innerText = 'Edit Deal';
        dealModal.show();
    };

    window.deleteDeal = async function(id) {
        if (confirm('Are you sure you want to delete this deal?')) {
            const response = await fetch(`/api/deals/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                loadDeals();
            } else {
                alert('Failed to delete deal');
            }
        }
    };

    loadUsersForDropdown();
    loadDeals();
});
</script>
</body>
</html>
